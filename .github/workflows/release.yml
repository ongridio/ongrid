name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  image:
    name: Publish release images and Helm chart
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ || "$version" != "$tag" ]]; then
            echo "VERSION ($version) must match release tag ($tag)" >&2
            exit 2
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to CNB registry
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      - name: Publish project multi-arch images
        shell: bash
        run: |
          set -euo pipefail
          make docker-push-release-images

      - name: Verify multi-arch manifests
        shell: bash
        run: |
          set -euo pipefail
          make verify-release-images

      - name: Publish Helm chart
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          make publish-k8s-chart

  build:
    name: Build ${{ matrix.arch }} package
    runs-on: ${{ matrix.runner }}
    needs: image
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must match vMAJOR.MINOR.PATCH, got: $tag" >&2
            exit 2
          fi
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "$version" != "$tag" ]]; then
            echo "VERSION ($version) must match tag ($tag)" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xz-utils unzip

      - name: Fetch bundled embedding model
        shell: bash
        run: |
          set -euo pipefail
          make fetch-embedding-model

      - name: Build ${{ matrix.arch }} package
        shell: bash
        run: |
          set -euo pipefail
          make package TARGET_OS=linux TARGET_ARCH=${{ matrix.arch }} PLATFORM=${{ matrix.platform }}

      - name: Verify package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          arch="${{ matrix.arch }}"
          test -s "dist/out/ongrid-${tag}-linux-${arch}.tar.xz"
          test -s "dist/out/ongrid-${tag}-linux-${arch}.tar.xz.sha256"
          (cd dist/out && sha256sum -c "ongrid-${tag}-linux-${arch}.tar.xz.sha256")

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.arch }}
          path: |
            dist/out/ongrid-${{ steps.tag.outputs.tag }}-linux-${{ matrix.arch }}.tar.xz
            dist/out/ongrid-${{ steps.tag.outputs.tag }}-linux-${{ matrix.arch }}.tar.xz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must match vMAJOR.MINOR.PATCH, got: $tag" >&2
            exit 2
          fi
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "$version" != "$tag" ]]; then
            echo "VERSION ($version) must match tag ($tag)" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist/out
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          for arch in amd64 arm64; do
            test -s "dist/out/ongrid-${tag}-linux-${arch}.tar.xz"
            test -s "dist/out/ongrid-${tag}-linux-${arch}.tar.xz.sha256"
            (cd dist/out && sha256sum -c "ongrid-${tag}-linux-${arch}.tar.xz.sha256")
          done

      - name: Write release metadata
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > dist/out/latest.json <<EOF
          {
            "version": "${tag}",
            "tag_name": "${tag}",
            "release_url": "https://github.com/ongridio/ongrid/releases/tag/${tag}",
            "published_at": "${published_at}",
            "download_base": "https://ongrid.cloud/dl",
            "assets": {
              "linux-amd64": {
                "package": "ongrid-${tag}-linux-amd64.tar.xz",
                "sha256": "ongrid-${tag}-linux-amd64.tar.xz.sha256"
              },
              "linux-arm64": {
                "package": "ongrid-${tag}-linux-arm64.tar.xz",
                "sha256": "ongrid-${tag}-linux-arm64.tar.xz.sha256"
              }
            }
          }
          EOF
          test -s dist/out/latest.json

      - name: Write release install notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          ## Install

          Ubuntu 22.04+, Debian 12+, RHEL/Rocky 9 are supported.

          ### AMD64
          \`\`\`bash
          wget https://github.com/ongridio/ongrid/releases/download/${tag}/ongrid-${tag}-linux-amd64.tar.xz
          tar -xf ongrid-${tag}-linux-amd64.tar.xz && cd ongrid-${tag}-linux-amd64 && sudo ./install.sh
          \`\`\`

          ### ARM64
          \`\`\`bash
          wget https://github.com/ongridio/ongrid/releases/download/${tag}/ongrid-${tag}-linux-arm64.tar.xz
          tar -xf ongrid-${tag}-linux-arm64.tar.xz && cd ongrid-${tag}-linux-arm64 && sudo ./install.sh
          \`\`\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          release_notes="$(cat "$RUNNER_TEMP/release-notes.md")"
          gh release create "$tag" \
            "dist/out/ongrid-${tag}-linux-amd64.tar.xz" \
            "dist/out/ongrid-${tag}-linux-amd64.tar.xz.sha256" \
            "dist/out/ongrid-${tag}-linux-arm64.tar.xz" \
            "dist/out/ongrid-${tag}-linux-arm64.tar.xz.sha256" \
            "dist/out/latest.json" \
            --verify-tag \
            --title "Ongrid ${tag}" \
            --generate-notes \
            --notes "$release_notes"
