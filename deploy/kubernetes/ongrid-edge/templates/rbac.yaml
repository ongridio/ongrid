apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ongrid-edge.fullname" . }}-credentials
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "ongrid-edge.credentialSecretName" . | quote }}]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ongrid-edge.fullname" . }}-credentials
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ongrid-edge.fullname" . }}-credentials
subjects:
  - kind: ServiceAccount
    name: {{ include "ongrid-edge.nodeServiceAccount" . }}
    namespace: {{ include "ongrid-edge.namespace" . }}
  - kind: ServiceAccount
    name: {{ include "ongrid-edge.controllerServiceAccount" . }}
    namespace: {{ include "ongrid-edge.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ongrid-edge.fullname" . }}-node
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ongrid-edge.fullname" . }}-node
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ongrid-edge.fullname" . }}-node
subjects:
  - kind: ServiceAccount
    name: {{ include "ongrid-edge.nodeServiceAccount" . }}
    namespace: {{ include "ongrid-edge.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ongrid-edge.fullname" . }}-controller
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services", "endpoints", "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ongrid-edge.fullname" . }}-controller
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ongrid-edge.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "ongrid-edge.controllerServiceAccount" . }}
    namespace: {{ include "ongrid-edge.namespace" . }}
