{{- $ksm := default dict .Values.kubeStateMetrics -}}
{{- if default false $ksm.enabled }}
{{- $image := default dict $ksm.image -}}
{{- $resources := default dict $ksm.resources -}}
{{- $port := default 8080 $ksm.port -}}
{{- $telemetryPort := default 8081 $ksm.telemetryPort -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ongrid-edge.kubeStateMetricsServiceAccount" . }}
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
---
{{- if eq .Values.mode "serverless" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ongrid-edge.kubeStateMetricsServiceAccount" . }}
    namespace: {{ include "ongrid-edge.namespace" . }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ongrid-edge.kubeStateMetricsServiceAccount" . }}
    namespace: {{ include "ongrid-edge.namespace" . }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "ongrid-edge.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: kube-state-metrics
  ports:
    - name: http-metrics
      port: {{ $port }}
      targetPort: http-metrics
    - name: telemetry
      port: {{ $telemetryPort }}
      targetPort: telemetry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ongrid-edge.kubeStateMetricsName" . }}
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ongrid-edge.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: kube-state-metrics
  template:
    metadata:
      labels:
        {{- include "ongrid-edge.labels" . | nindent 8 }}
        app.kubernetes.io/component: kube-state-metrics
    spec:
      serviceAccountName: {{ include "ongrid-edge.kubeStateMetricsServiceAccount" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurity.runAsUser }}
        runAsGroup: {{ .Values.podSecurity.runAsGroup }}
        fsGroup: {{ .Values.podSecurity.fsGroup }}
      containers:
        - name: kube-state-metrics
          image: {{ printf "%s:%s" (default "registry.k8s.io/kube-state-metrics/kube-state-metrics" $image.repository) (default "v2.16.0" $image.tag) | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $image.pullPolicy }}
          args:
            - --host=0.0.0.0
            - --port={{ $port }}
            - --telemetry-host=0.0.0.0
            - --telemetry-port={{ $telemetryPort }}
            - --resources={{ include "ongrid-edge.kubeStateMetricsResources" . }}
            {{- if eq .Values.mode "serverless" }}
            - --namespaces={{ include "ongrid-edge.namespace" . }}
            {{- end }}
          ports:
            - name: http-metrics
              containerPort: {{ $port }}
            - name: telemetry
              containerPort: {{ $telemetryPort }}
          resources:
            {{- if $resources }}
            {{- toYaml $resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
{{- end }}
