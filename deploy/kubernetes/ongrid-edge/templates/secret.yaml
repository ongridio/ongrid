apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ongrid-edge.fullname" . }}-bootstrap
  namespace: {{ include "ongrid-edge.namespace" . }}
  labels:
    {{- include "ongrid-edge.labels" . | nindent 4 }}
type: Opaque
stringData:
  cluster-id: {{ required "enrollment.clusterID is required" .Values.enrollment.clusterID | quote }}
  bootstrap-token: {{ required "enrollment.bootstrapToken is required" .Values.enrollment.bootstrapToken | quote }}
