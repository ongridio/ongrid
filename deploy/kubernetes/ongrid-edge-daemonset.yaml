apiVersion: v1
kind: Namespace
metadata:
  name: ongrid
---
apiVersion: v1
kind: Secret
metadata:
  name: ongrid-edge-credentials
  namespace: ongrid
type: Opaque
stringData:
  access-key: "<edge-access-key>"
  secret-key: "<edge-secret-key>"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ongrid-edge
  namespace: ongrid
  labels:
    app.kubernetes.io/name: ongrid-edge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ongrid-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ongrid-edge
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: ongrid-edge
          image: ongrid-edge:v0.9.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ONGRID_EDGE_CLOUD_ADDR
              value: "<manager-host>:40012"
            - name: ONGRID_EDGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ongrid-edge-credentials
                  key: access-key
            - name: ONGRID_EDGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ongrid-edge-credentials
                  key: secret-key
            - name: ONGRID_EDGE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ONGRID_EDGE_COLLECTOR_MODE
              value: "auto"
          ports:
            - name: metrics
              containerPort: 9101
              protocol: TCP
          volumeMounts:
            - name: edge-state
              mountPath: /var/lib/ongrid-edge
            - name: host-var-log
              mountPath: /var/log
              readOnly: true
      volumes:
        - name: edge-state
          hostPath:
            path: /var/lib/ongrid-edge
            type: DirectoryOrCreate
        - name: host-var-log
          hostPath:
            path: /var/log
            type: Directory
