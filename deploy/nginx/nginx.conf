# ongrid production nginx — TLS termination + SPA static + /api reverse proxy.
# Shipped inside ongrid-web image; bind-mounted by docker-compose at runtime so
# operators can edit it without rebuilding the image. Keep this file in sync
# with deploy/install/nginx.conf (the operator-side override).

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # WebSocket Connection header bridge — when the client's Upgrade
    # header is set we forward "upgrade" downstream; otherwise empty
    # string so HTTP/1.1 keepalive doesn't get hijacked. Required
    # by /api/v1/devices/{id}/shell (WebSSH) and any future SSE/WS.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }

    # Manager (ongrid) HTTP API. Reachable inside the docker compose network
    # only; host port 8080 is intentionally NOT published.
    upstream ongrid_backend {
        server ongrid:8080;
        keepalive 16;
    }
    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 8;
    }
    upstream grafana_backend {
        server grafana:3000;
        keepalive 8;
    }
    # Loki upstream (ADR-012). Internal port 3100 — we expose Loki to
    # edges only via /loki/api/v1/push location with auth_request below.
    upstream loki_backend {
        server loki:3100;
        keepalive 8;
    }
    # Tempo upstream (ADR-013). OTLP HTTP receiver port 4318 — we expose
    # Tempo to edges only via /v1/traces location with auth_request below.
    upstream tempo_backend {
        server tempo:4318;
        keepalive 8;
    }

    # Per-edge ingest rate limit (ADR-014 §决策第 4 条). Key on the basic
    # auth user (= edge access key) so one noisy edge can't starve others.
    # Burst sized for ~16 MB/s sustained per edge plus 200-batch headroom.
    limit_req_zone $http_authorization zone=edge_dataplane:16m rate=2000r/m;
    limit_req_zone $binary_remote_addr zone=k8s_enrollment:10m rate=120r/m;

    # ---- 80 -> 443 redirect ------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- 443 main vhost ----------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (HSTS intentionally omitted — self-signed cert by
        # default; operator can add it after dropping in a real cert).
        add_header X-Content-Type-Options nosniff       always;
        add_header X-Frame-Options        SAMEORIGIN    always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;

        client_max_body_size 4M;

        # ---- API reverse proxy --------------------------------------------
        # Long timeouts so the chat blocking POST (LLM round-trip) doesn't
        # get severed; manager decides its own deadline. Buffering off so
        # the chat SSE stream (/api/v1/chat/sessions/{id}/messages/stream)
        # flushes incrementally to the browser as the agent loop emits
        # tool_start / tool_end / done frames; without this nginx waits
        # until the response completes and the user sees nothing for
        # seconds.
        location /api/ {
            proxy_pass http://ongrid_backend;
            proxy_http_version 1.1;
            # Marketplace skill upload (POST /api/v1/marketplace/upload) accepts
            # packs up to the backend's 64MiB cap — a skill that ships a binary
            # (e.g. terraform, ~26MiB packed) exceeds the 4M server default and
            # nginx 413s before the request reaches the backend. Lift it here.
            client_max_body_size 70M;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket upgrade: forward Upgrade + bridged Connection
            # so /api/v1/devices/{id}/shell (and any future WS/SSE)
            # actually upgrades. Keepalive (Connection: "") still works
            # when Upgrade header is absent — the map above resolves
            # to "" in that case.
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering       off;
            proxy_cache           off;
            chunked_transfer_encoding on;
        }

        location = /__auth_prometheus {
            internal;
            proxy_pass http://ongrid_backend/api/v1/prometheus/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI    $request_uri;
            proxy_set_header Cookie            $http_cookie;
        }

        # ---- Telemetry data plane: Loki push (ADR-012 / ADR-014) ----------
        # Edge promtail uses an edge credential; the Kubernetes Telemetry
        # Gateway uses its cluster-scoped telemetry credential. nginx
        # auth_request validates either data-plane identity, then
        # proxy_pass es to internal loki:3100 — manager Go is NOT on this
        # byte stream (ADR-014 §决策第 1 条).
        location = /loki/api/v1/push {
            auth_request     /__auth_dataplane;
            auth_request_set $edge_id $upstream_http_x_edge_id;

            limit_req        zone=edge_dataplane burst=200 nodelay;
            client_max_body_size 16M;

            proxy_pass http://loki_backend/loki/api/v1/push;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Edge-Id         $edge_id;
            proxy_set_header X-Scope-OrgID     ongrid;
            proxy_set_header Authorization     "";
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location = /__auth_dataplane {
            internal;
            proxy_pass http://ongrid_backend/internal/auth/dataplane-verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header Authorization     $http_authorization;
            proxy_set_header X-Original-URI    $request_uri;
        }

        location = /__auth_edge {
            internal;
            proxy_pass http://ongrid_backend/internal/auth/edge-verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /__auth_telemetry {
            internal;
            proxy_pass http://ongrid_backend/internal/auth/telemetry-verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /internal/k8s/enroll {
            limit_req zone=k8s_enrollment burst=500 nodelay;
            limit_req_status 429;
            proxy_pass http://ongrid_backend/internal/k8s/enroll;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /internal/k8s/telemetry-config {
            auth_request     /__auth_edge;
            auth_request_set $edge_id $upstream_http_x_edge_id;
            proxy_pass http://ongrid_backend/internal/k8s/telemetry-config;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Edge-Id         $edge_id;
            proxy_set_header Authorization     "";
        }

        # ---- Telemetry data plane: Tempo OTLP HTTP push (ADR-013/014) -----
        # Edge otelcol-contrib uses an edge credential; the Kubernetes
        # Telemetry Gateway uses its cluster-scoped telemetry credential.
        # nginx auth_request validates either data-plane identity,
        # then proxy_pass es to internal tempo:4318/v1/traces — manager Go
        # is NOT on this byte stream (ADR-014 §决策第 1 条).
        location = /v1/traces {
            auth_request     /__auth_dataplane;
            auth_request_set $edge_id $upstream_http_x_edge_id;

            limit_req        zone=edge_dataplane burst=200 nodelay;
            client_max_body_size 16M;

            proxy_pass http://tempo_backend/v1/traces;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Edge-Id         $edge_id;
            proxy_set_header X-Scope-OrgID     ongrid;
            proxy_set_header Authorization     "";
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Kubernetes telemetry metrics remote_write. This exact write-only
        # route is authenticated with the cluster telemetry credential and
        # bypasses manager Go and the controller tunnel.
        location = /prometheus/api/v1/write {
            auth_request     /__auth_telemetry;
            auth_request_set $cluster_id $upstream_http_x_cluster_id;

            limit_req        zone=edge_dataplane burst=200 nodelay;
            client_max_body_size 16M;

            # Embedded Prometheus runs with --web.route-prefix=/prometheus/.
            proxy_pass http://prometheus_backend/prometheus/api/v1/write;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Cluster-Id      $cluster_id;
            proxy_set_header Authorization     "";
            proxy_set_header Connection        "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ---- Health endpoints (passthrough for ops probes) -----------------
        location = /healthz {
            proxy_pass http://ongrid_backend/healthz;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }
        location = /readyz {
            proxy_pass http://ongrid_backend/readyz;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        location /prometheus/ {
            auth_request /__auth_prometheus;
            # Sliding refresh: __auth_prometheus re-mints the prom ticket
            # cookie on each successful auth subrequest. Capture its
            # Set-Cookie and surface it on the main response so the
            # browser sees the fresh expiry. Without this the auth
            # subrequest's cookie is dropped and TTL stays fixed at
            # mint time, causing 401 mid-read.
            auth_request_set $auth_cookie $upstream_http_set_cookie;
            add_header Set-Cookie $auth_cookie;
            proxy_pass http://prometheus_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        location /grafana/ {
            auth_request /__auth_prometheus;
            auth_request_set $auth_cookie $upstream_http_set_cookie;
            add_header Set-Cookie $auth_cookie;
            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ---- SPA static assets (cache hard, immutable hashed filenames) ----
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # ---- Edge curl-pipe installer + binary downloads -------------------
        # Public, no auth. Bind-mount: /opt/ongrid/edge -> /usr/share/nginx/html/edge
        location = /install.sh {
            alias /usr/share/nginx/html/edge/install.sh;
            default_type text/plain;
            add_header Cache-Control "no-store" always;
        }
        location = /uninstall.sh {
            alias /usr/share/nginx/html/edge/uninstall.sh;
            default_type text/plain;
            add_header Cache-Control "no-store" always;
        }
        location /edge/ {
            alias /usr/share/nginx/html/edge/;
            default_type application/octet-stream;
            add_header Cache-Control "no-store" always;
            autoindex off;
        }

        # ---- SPA fallback --------------------------------------------------
        # React Router owns client-side routes; any unknown path returns
        # index.html so the SPA can render the right view.
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }
    }
}
