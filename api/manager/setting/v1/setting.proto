syntax = "proto3";

package ongrid.manager.setting.v1;

option go_package = "github.com/ongridio/ongrid/api/gen/manager/setting/v1;settingv1";

// SettingService 管理管理员可编辑的运行时配置。
service SettingService {
    // ValidateLLMConfiguration 使用未落库的草稿配置发起最小模型请求，
    // 返回可机器识别的失败原因。HTTP 实现：
    // POST /api/v1/integrations/llm/test。
    rpc ValidateLLMConfiguration(ValidateLLMConfigurationRequest) returns (ValidateLLMConfigurationResponse);
    // ValidateAndSaveLLMConfiguration 校验同一份草稿中的全部模型，并在
    // 全部通过后原子保存；空 api_key 表示显式禁用该提供商。
    // HTTP 实现：POST /api/v1/integrations/llm/validate-and-save。
    rpc ValidateAndSaveLLMConfiguration(ValidateLLMConfigurationRequest) returns (ValidateLLMConfigurationResponse);
}

message ValidateLLMConfigurationRequest {
    // provider 是稳定提供商 ID：openai / anthropic / zhipu / gemini /
    // deepseek / kimi / custom。
    string provider = 1 [json_name = "provider"];
    // api_key 只用于本次探测，不写数据库、不写日志。
    string api_key = 2 [json_name = "api_key"];
    // 命名提供商留空时使用服务端默认端点；custom 必填。
    string base_url = 3 [json_name = "base_url"];
    // default_model 是默认模型，必须包含在 models 中。
    string default_model = 4 [json_name = "default_model"];
    // models 是保存后会暴露给调用方的完整模型列表；校验会逐一实际调用。
    repeated string models = 5 [json_name = "models"];
}

message ValidateLLMConfigurationResponse {
    bool valid = 1 [json_name = "valid"];
    // 稳定错误码；成功为 ok。前端按 code 映射本地化文案。
    string code = 2 [json_name = "code"];
    string provider = 3 [json_name = "provider"];
    string model = 4 [json_name = "model"];
    // 上游返回的安全摘要；不得包含 API key 或完整响应体。
    string detail = 5 [json_name = "detail"];
    int64 latency_ms = 6 [json_name = "latency_ms"];
    // saved 仅由 validate-and-save 返回，表示整组配置已原子落库。
    bool saved = 7 [json_name = "saved"];
    // disabled 表示空 api_key 已作为显式禁用覆盖落库。
    bool disabled = 8 [json_name = "disabled"];
}
